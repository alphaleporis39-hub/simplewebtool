<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6d28d9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- SEO -->
    <title>Finance Tools - EMI, SIP &amp; Inflation Calculators</title>
    <meta
      name="description"
      content="Free finance calculators for EMI, SIP investment growth and inflation planning. Fast browser-based tools for everyday money decisions."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://simplewebtool.online/pages/finance.html" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Simple Web Tools" />
    <meta property="og:title" content="Finance Tools - Simple Web Tools" />
    <meta property="og:description" content="Calculate EMI, SIP returns and future costs after inflation." />
    <meta property="og:url" content="https://simplewebtool.online/pages/finance.html" />
    <meta property="og:image" content="/assets/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Finance Tools - Simple Web Tools" />
    <meta name="twitter:description" content="Calculate EMI, SIP returns and future costs after inflation." />
    <meta name="twitter:image" content="/assets/og-image.png" />

    <!-- Icons & PWA -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css" />

    <!-- Structured Data: breadcrumb -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://simplewebtool.online/" },
          { "@type": "ListItem", "position": 2, "name": "Dashboard", "item": "https://simplewebtool.online/pages/dashboard.html" },
          { "@type": "ListItem", "position": 3, "name": "Finance Tools", "item": "https://simplewebtool.online/pages/finance.html" }
        ]
      }
    </script>

    <!-- Pre-paint theme -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('swt-theme');
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved === 'light' || saved === 'dark' ? saved : sysDark ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>

  <body data-requires-auth data-nav>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="bg-decor" aria-hidden="true">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
    </div>

    <!-- Navbar injected by script.js -->
    <div id="navbar"></div>

    <main id="main" class="container page">
      <header class="page-head animate-in">
        <h1>Finance Tools</h1>
        <p>Plan loans, investments and future costs with quick, practical calculators.</p>
      </header>

      <div class="tools-grid">
        <!-- ============================================================= -->
        <!-- 1. EMI Calculator                                             -->
        <!-- ============================================================= -->
        <section class="card tool" aria-labelledby="emi-title">
          <div class="tool-header">
            <span class="tool-icon" aria-hidden="true">EMI</span>
            <h2 id="emi-title">EMI Calculator</h2>
          </div>

          <form id="emiForm" class="stack" novalidate>
            <div class="field">
              <label for="emiAmount">Loan amount</label>
              <input id="emiAmount" class="input" type="number" min="1" step="any" inputmode="decimal" placeholder="e.g. 500000" required />
            </div>

            <div class="field-row">
              <div class="field">
                <label for="emiRate">Annual interest rate (%)</label>
                <input id="emiRate" class="input" type="number" min="0" step="any" inputmode="decimal" placeholder="e.g. 9.5" required />
              </div>
              <div class="field">
                <label for="emiYears">Tenure (years)</label>
                <input id="emiYears" class="input" type="number" min="0.1" step="any" inputmode="decimal" placeholder="e.g. 5" required />
              </div>
            </div>

            <div class="tool-actions">
              <button class="btn btn-primary" type="submit">Calculate EMI</button>
              <button class="btn btn-ghost" type="reset">Reset</button>
            </div>
            <p class="field-error" id="emiError" role="alert" aria-live="polite"></p>
          </form>

          <div class="result is-empty" id="emiResult" aria-live="polite"></div>
        </section>

        <!-- ============================================================= -->
        <!-- 2. SIP Calculator                                             -->
        <!-- ============================================================= -->
        <section class="card tool" aria-labelledby="sip-title">
          <div class="tool-header">
            <span class="tool-icon" aria-hidden="true">SIP</span>
            <h2 id="sip-title">SIP Calculator</h2>
          </div>

          <form id="sipForm" class="stack" novalidate>
            <div class="field">
              <label for="sipMonthly">Monthly investment</label>
              <input id="sipMonthly" class="input" type="number" min="1" step="any" inputmode="decimal" placeholder="e.g. 5000" required />
            </div>

            <div class="field-row">
              <div class="field">
                <label for="sipReturn">Expected annual return (%)</label>
                <input id="sipReturn" class="input" type="number" min="0" step="any" inputmode="decimal" placeholder="e.g. 12" required />
              </div>
              <div class="field">
                <label for="sipYears">Investment period (years)</label>
                <input id="sipYears" class="input" type="number" min="0.1" step="any" inputmode="decimal" placeholder="e.g. 10" required />
              </div>
            </div>

            <div class="tool-actions">
              <button class="btn btn-primary" type="submit">Calculate SIP</button>
              <button class="btn btn-ghost" type="reset">Reset</button>
            </div>
            <p class="field-error" id="sipError" role="alert" aria-live="polite"></p>
          </form>

          <div class="result is-empty" id="sipResult" aria-live="polite"></div>
          <div
            id="sipChartWrap"
            class="result"
            style="display:none;height:280px;margin-top:1rem;"
            aria-label="SIP growth chart"
          >
            <canvas id="sipChart"></canvas>
          </div>
        </section>

        <!-- ============================================================= -->
        <!-- 3. Inflation Calculator                                       -->
        <!-- ============================================================= -->
        <section class="card tool" aria-labelledby="inflation-title">
          <div class="tool-header">
            <span class="tool-icon" aria-hidden="true">INF</span>
            <h2 id="inflation-title">Inflation Calculator</h2>
          </div>

          <form id="inflationForm" class="stack" novalidate>
            <div class="field">
              <label for="infAmount">Current amount</label>
              <input id="infAmount" class="input" type="number" min="1" step="any" inputmode="decimal" placeholder="e.g. 100000" required />
            </div>

            <div class="field-row">
              <div class="field">
                <label for="infRate">Inflation rate (%)</label>
                <input id="infRate" class="input" type="number" min="0" step="any" inputmode="decimal" placeholder="e.g. 6" required />
              </div>
              <div class="field">
                <label for="infYears">Years</label>
                <input id="infYears" class="input" type="number" min="0" step="any" inputmode="decimal" placeholder="e.g. 10" required />
              </div>
            </div>

            <div class="tool-actions">
              <button class="btn btn-primary" type="submit">Calculate Inflation</button>
              <button class="btn btn-ghost" type="reset">Reset</button>
            </div>
            <p class="field-error" id="infError" role="alert" aria-live="polite"></p>
          </form>

          <div class="result is-empty" id="infResult" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>
          Made with <span aria-hidden="true">&hearts;</span><span class="sr-only">love</span> by Mohit
          Chaudhary &middot; <span id="footerYear">2026</span> &middot; All Rights Reserved
        </p>
      </div>
    </footer>

    <noscript>
      <div class="noscript-banner">Simple Web Tools needs JavaScript enabled to work.</div>
    </noscript>

    <!-- Chart.js is optional; finance.js shows a fallback if the CDN is unavailable. -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script type="module" src="/js/script.js"></script>
    <script type="module" src="/js/tools/finance.js"></script>
  </body>
</html>
